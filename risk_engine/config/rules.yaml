# Risk Engine Rules
#
# Rules removed in this refactor:
#   FIM_CONFIG_TAMPER  — tenant file hashing removed (violates workload ownership)
#   FIM_FILE_MODIFIED  — tenant file hashing removed
#   SUSPICIOUS_PROCESS — process name denylist removed (trivially spoofable)
#   UNAUTH_PROCESS     — same reason
#   HIGH_CPU / HIGH_MEMORY / PROCESS_COUNT — replaced by infrastructure detections
#
# New rules added:
#   IMAGE_MISMATCH, UNAPPROVED_IMAGE, IMAGE_DRIFT
#   RUNTIME_DRIFT
#   CONFIG_DRIFT, POLICY_TAMPER, ALLOWLIST_TAMPER
#   CONTAINER_EXEC, UNEXPECTED_EXEC, SUSPICIOUS_RESTART_PATTERN, UNEXPECTED_NETWORK_ATTACH
#   FALCO_ALERT, REVERSE_SHELL, PRIV_ESC_ATTEMPT, CONTAINER_ESCAPE_ATTEMPT

# ── Protocol Layer ────────────────────────────────────────────────────────────

- id: ROGUE_NODE
  match:
    reasons_contains: "Rogue node"
  severity: 50
  blast_radius: 30

- id: NODE_IMPERSONATION
  match:
    reasons_contains: "machine_id"
  severity: 60
  blast_radius: 40

- id: REPLAY_ATTACK
  match:
    reasons_contains: "Replay attack"
  severity: 45
  blast_radius: 25

- id: FLOOD_ATTACK
  match:
    reasons_contains: "flooding"
  severity: 30
  blast_radius: 15

- id: TELEMETRY_TAMPER
  match:
    reasons_contains: "HMAC"
  severity: 50
  blast_radius: 30

- id: SILENT_NODE
  match:
    reasons_contains: "not reported"
  severity: 40
  blast_radius: 20

# ── Network / NIDS Layer ──────────────────────────────────────────────────────

- id: NETWORK_THREAT
  match:
    reasons_contains: "Network threat"
  severity: 55
  blast_radius: 35

- id: LATERAL_MOVEMENT
  match:
    reasons_contains: "Lateral movement"
  severity: 55
  blast_radius: 35

# ── Image Attestation (Improvement 1) ────────────────────────────────────────

- id: IMAGE_MISMATCH
  match:
    reasons_contains: "Image digest mismatch"
  severity: 65
  blast_radius: 40

- id: UNAPPROVED_IMAGE
  match:
    reasons_contains: "no approved image digest"
  severity: 55
  blast_radius: 35

- id: IMAGE_DRIFT
  match:
    reasons_contains: "Image drift"
  severity: 55
  blast_radius: 35

# ── Runtime Drift Detection (Improvement 2) ──────────────────────────────────

- id: RUNTIME_DRIFT
  match:
    reasons_contains: "Runtime drift"
  severity: 40
  blast_radius: 20

# ── Infrastructure Config Integrity (Improvement 3) ──────────────────────────

- id: CONFIG_DRIFT
  match:
    reasons_contains: "Infrastructure config modified"
  severity: 55
  blast_radius: 35

- id: POLICY_TAMPER
  match:
    reasons_contains: "rules.yaml"
  severity: 65
  blast_radius: 45

- id: ALLOWLIST_TAMPER
  match:
    reasons_contains: "master_config.yaml"
  severity: 70
  blast_radius: 50

# ── Docker Event Analytics (Improvement 4) ───────────────────────────────────

- id: CONTAINER_EXEC
  match:
    reasons_contains: "exec"
  severity: 45
  blast_radius: 25

- id: UNEXPECTED_EXEC
  match:
    reasons_contains: "UNEXPECTED_EXEC"
  severity: 40
  blast_radius: 25

- id: SUSPICIOUS_RESTART_PATTERN
  match:
    reasons_contains: "SUSPICIOUS_RESTART_PATTERN"
  severity: 40
  blast_radius: 20

- id: UNEXPECTED_NETWORK_ATTACH
  match:
    reasons_contains: "UNEXPECTED_NETWORK_ATTACH"
  severity: 40
  blast_radius: 25

# ── Falco Integration (Improvement 5) ────────────────────────────────────────

- id: FALCO_ALERT
  match:
    reasons_contains: "Falco alert"
  severity: 50
  blast_radius: 30

- id: REVERSE_SHELL
  match:
    reasons_contains: "REVERSE_SHELL"
  severity: 80
  blast_radius: 60

- id: PRIV_ESC_ATTEMPT
  match:
    reasons_contains: "PRIV_ESC_ATTEMPT"
  severity: 70
  blast_radius: 50

- id: CONTAINER_ESCAPE_ATTEMPT
  match:
    reasons_contains: "CONTAINER_ESCAPE_ATTEMPT"
  severity: 90
  blast_radius: 70
