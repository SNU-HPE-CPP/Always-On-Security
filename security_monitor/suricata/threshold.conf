# Scan thresholds for the HPC simulator.
# Suricata count thresholds approximate unique-port scans by source host.
# Fast scan: more than 15 attempts in 30 seconds -> HIGH
# Slow scan: more than 40 attempts in 600 seconds -> MEDIUM

event_filter gen_id 1, sig_id 9000101, type both, track by_src, count 15, seconds 30
 event_filter gen_id 1, sig_id 9000102, type both, track by_src, count 40, seconds 600
