services:
  # ── Docker Socket Proxy (Improvement 7) ───────────────────────────
  # Sits between infrastructure services and the Docker daemon.
  # Only exposes the specific API endpoints required by each consumer.
  # Prevents accidental or malicious broad socket access.
  #
  # Required endpoints:
  #   host-observer:    GET /containers, GET /images, GET /info
  #   security-monitor: GET /containers, GET /events
  #   risk-engine:      POST /containers/{id}/pause, POST /containers/{id}/stop,
  #                     POST /networks/{id}/disconnect, GET /containers/{id}/json
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.5

  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: controller
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
    volumes:
      - shared_data:/data
      - ./risk_engine/config:/opt/security/config:ro
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.10

  risk-engine:
    build:
      context: .
      dockerfile: risk_engine/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: risk-engine
    expose:
      - "5557"
    cap_add:
      - NET_ADMIN
    environment:
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - shared_data:/data
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
      - docker-socket-proxy
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.11

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    volumes:
      - shared_data:/data:ro
    depends_on:
      - risk-engine
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.20
      host-access:
    ports:
      - "5000:5000"

  # ── Tenant Workload Nodes (Workload_Zone) ──────────────────────────
  # Principle of least privilege:
  #   • No HMAC_SECRET — tenants have zero visibility into the security bus
  #   • No security config volume mounts
  #   • No capabilities beyond the Docker default set
  #   • No Docker socket access
  #   • Non-root user (appuser, UID 10001) enforced in Dockerfile
  node1:
    build:
      context: node_agent
    container_name: node1
    environment:
      - NODE_NAME=node1
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.21
      mgmt-net:
        ipv4_address: 10.10.3.21

  node2:
    build:
      context: node_agent
    container_name: node2
    environment:
      - NODE_NAME=node2
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.22
      mgmt-net:
        ipv4_address: 10.10.3.22

  node3:
    build:
      context: node_agent
    container_name: node3
    environment:
      - NODE_NAME=node3
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.23
      mgmt-net:
        ipv4_address: 10.10.3.23

  node4:
    build:
      context: node_agent
    container_name: node4
    environment:
      - NODE_NAME=node4
    depends_on:
      - controller
    networks:
      storage-net:
        ipv4_address: 10.10.2.31
      mgmt-net:
        ipv4_address: 10.10.3.31

  # ── Host/Cluster Observer (Infrastructure_Zone) ────────────────────
  # External observer: reads Docker stats, validates image digests,
  # checks runtime drift, and monitors infrastructure config integrity.
  # All detection via Docker API — no exec into tenant containers.
  # HMAC_SECRET scoped to Infrastructure_Zone only.
  # Uses docker-socket-proxy — no direct docker.sock access.
  host-observer:
    build:
      context: .
      dockerfile: host_observer/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: host-observer
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - CONTROLLER_URL=tcp://controller:5555
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
      - docker-socket-proxy
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.12

  alert_ingestor:
    build:
      context: alert_ingestor
    container_name: alert_ingestor
    volumes:
      - shared_data:/data
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.40

  # ── Security Monitor (Infrastructure_Zone) ─────────────────────────
  # Runs Suricata + Zeek for passive NIDS and the Python pipeline:
  #   docker_collector → falco_collector → network_collector →
  #   threat_correlator → policy_engine → event_forwarder
  #
  # falco_collector tails /var/log/falco/events.json written by the
  # host-installed Falco (see README — containerised Falco does not
  # support kernel 6.19 yet). Mount the host path as a bind mount
  # once Falco is installed natively.
  security-monitor:
    build:
      context: .
      dockerfile: security_monitor/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: security-monitor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - CONTROLLER_URL=tcp://controller:5555
      - SURICATA_INTERFACE=eth0
      - ZEEK_INTERFACE=eth0
      - ZEEK_SCRIPT=/opt/security-monitor/zeek/hpc_monitor.zeek
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - FALCO_OUTPUT_FILE=/var/log/falco/events.json
    depends_on:
      - alert_ingestor
      - controller
      - docker-socket-proxy
    volumes:
      - shared_data:/var/log/shared
      - ./risk_engine/config:/opt/security/config:ro
      - /var/log/falco:/var/log/falco:ro
    networks:
      compute-net:
        ipv4_address: 10.10.1.250
      storage-net:
        ipv4_address: 10.10.2.250
      mgmt-net:
        ipv4_address: 10.10.3.250

  # ── Falco (Infrastructure_Zone) ────────────────────────────────────
  # ── Falco (host-native, kernel-level syscall monitor) ─────────────────────
  # Falco 0.44.1 (modern eBPF) is installed natively on the host and writes
  # JSON events to /var/log/falco/events.json.  security-monitor mounts this
  # path read-only (bind mount below) so falco_collector.py can tail it without
  # any containerised Falco process.
  #
  # Confirmed working: Falco 0.44.1 + Linux 6.11.0-19-generic (Ubuntu 24.04).
  #
  # To run Falco as a host service:
  #   sudo falco --modern-bpf \
  #     -o json_output=true \
  #     -o file_output.enabled=true \
  #     -o file_output.filename=/var/log/falco/events.json \
  #     -o file_output.keep_alive=true
  #
  # A containerised Falco service is not required: the bind mount
  #   - /var/log/falco:/var/log/falco:ro
  # on security-monitor provides the same event stream to falco_collector.py.

networks:
  compute-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.1.0/24
  storage-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.2.0/24
  mgmt-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.3.0/24
  # Non-internal bridge used exclusively to publish the dashboard port to the host.
  # No other services join this network, so it doesn't widen the attack surface.
  host-access:
    driver: bridge

volumes:
  shared_data:
  falco_logs:
