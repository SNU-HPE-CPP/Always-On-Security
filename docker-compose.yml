services:
  # ── Docker Socket Proxy (Improvement 7) ───────────────────────────
  # Sits between infrastructure services and the Docker daemon.
  # Only exposes the specific API endpoints required by each consumer.
  # Prevents accidental or malicious broad socket access.
  #
  # Required endpoints:
  #   host-observer:    GET /containers, GET /events, GET /info
  #   security-monitor: GET /containers, GET /events
  #   risk-engine:      POST /containers/{id}/pause, POST /containers/{id}/stop,
  #                     POST /networks/{id}/disconnect, GET /containers/{id}/json
  #
  # All other endpoints are blocked by the proxy.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      # Read-only APIs needed by host-observer and security-monitor
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      IMAGES: 1
      NETWORKS: 1
      # Write APIs needed by risk-engine enforcement
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.5

  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: controller
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
      # ── REC-08: Pre-flight integrity check ──────────────────────────
      - SERVICE_NAME=controller
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
      - CONFIG_DIR=/opt/security/config
      - INTEGRITY_AUDIT_DIR=/data/integrity_audits
      - INTEGRITY_ALLOW_MISSING_MANIFEST=${INTEGRITY_ALLOW_MISSING_MANIFEST:-true}
      - INTEGRITY_STRICT=${INTEGRITY_STRICT:-false}
    volumes:
      - shared_data:/data
      - integrity_audits:/data/integrity_audits
      - ./risk_engine/config:/opt/security/config:ro
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.10

  risk-engine:
    build:
      context: .
      dockerfile: risk_engine/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: risk-engine
    # ── Security: capabilities required for non-root enforcement actions ──
    # CAP_NET_ADMIN: allows appuser (UID 1000) to manage iptables DROP rules
    #                for node isolation without running as root (DL3002 fix).
    cap_add:
      - NET_ADMIN
    environment:
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
      # ── REC-08: Pre-flight integrity check ──────────────────────────
      - SERVICE_NAME=risk-engine
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
      - CONFIG_DIR=/opt/security/config
      - INTEGRITY_AUDIT_DIR=/data/integrity_audits
      - INTEGRITY_ALLOW_MISSING_MANIFEST=${INTEGRITY_ALLOW_MISSING_MANIFEST:-true}
      - INTEGRITY_STRICT=${INTEGRITY_STRICT:-false}
      # ── REC-09: Forensic capture directory ──────────────────────────
      - FORENSICS_DIR=/data/forensics
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    cap_add:
      - NET_ADMIN
    volumes:
      - shared_data:/data
      - integrity_audits:/data/integrity_audits
      - forensics:/data/forensics
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
      - docker-socket-proxy
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.11

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    volumes:
      - shared_data:/data:ro
    depends_on:
      - risk-engine
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.20
      host-access:
    ports:
      - "5000:5000"

  # ── Tenant Workload Nodes (Workload_Zone) ──────────────────────────
  # Principle of least privilege:
  #   • No HMAC_SECRET — tenants have zero visibility into the security bus
  #   • No security config volume mounts
  #   • No capabilities beyond the Docker default set
  #   • No Docker socket access
  #   • Non-root user (appuser, UID 10001) enforced in Dockerfile
  node1:
    build:
      context: node_agent
    container_name: node1
    environment:
      - NODE_NAME=node1
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.21
      mgmt-net:
        ipv4_address: 10.10.3.21

  node2:
    build:
      context: node_agent
    container_name: node2
    environment:
      - NODE_NAME=node2
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.22
      mgmt-net:
        ipv4_address: 10.10.3.22

  node3:
    build:
      context: node_agent
    container_name: node3
    environment:
      - NODE_NAME=node3
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.23
      mgmt-net:
        ipv4_address: 10.10.3.23

  node4:
    build:
      context: node_agent
    container_name: node4
    environment:
      - NODE_NAME=node4
    depends_on:
      - controller
    networks:
      storage-net:
        ipv4_address: 10.10.2.31
      mgmt-net:
        ipv4_address: 10.10.3.31

  # ── Host/Cluster Observer (Infrastructure_Zone) ────────────────────
  # External observer: reads Docker stats, validates image digests,
  # checks runtime drift, and monitors infrastructure config integrity.
  # All detection via Docker API — no exec into tenant containers.
  # HMAC_SECRET scoped to Infrastructure_Zone only.
  # Uses docker-socket-proxy — no direct docker.sock access.
  host-observer:
    build:
      context: .
      dockerfile: host_observer/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: host-observer
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - CONTROLLER_URL=tcp://controller:5555
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
      - docker-socket-proxy
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.12

  wazuh:
    build:
      context: wazuh
    container_name: wazuh
    volumes:
      - shared_data:/data
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.40

  # ── Security Monitor (Infrastructure_Zone) ─────────────────────────
  # Runs Suricata + Zeek for passive NIDS and the Python pipeline:
  #   docker_collector → falco_collector → network_collector →
  #   threat_correlator → policy_engine → event_forwarder
  #
  # Also tails Falco event output from the shared falco-logs volume.
  security-monitor:
    build:
      context: .
      dockerfile: security_monitor/Dockerfile
      args:
        DOCKER_GID: "963"
    container_name: security-monitor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - CONTROLLER_URL=tcp://controller:5555
      - SURICATA_INTERFACE=eth0
      - ZEEK_INTERFACE=eth0
      - ZEEK_SCRIPT=/opt/security-monitor/zeek/hpc_monitor.zeek
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - FALCO_OUTPUT_FILE=/var/log/falco/events.json
    depends_on:
      - wazuh
      - controller
      - docker-socket-proxy
    volumes:
      - shared_data:/var/log/shared
      - ./risk_engine/config:/opt/security/config:ro
      - falco_logs:/var/log/falco:ro
    networks:
      compute-net:
        ipv4_address: 10.10.1.250
      storage-net:
        ipv4_address: 10.10.2.250
      mgmt-net:
        ipv4_address: 10.10.3.250

  # ── Falco (Infrastructure_Zone) ────────────────────────────────────
  # Host-level runtime security sensor.
  # Runs in the Infrastructure Zone — never inside workload containers.
  # Events are written to a shared volume read by security-monitor.
  #
  # falcoctl auto-selects modern_ebpf driver (visible in logs).
  # Config is passed via FALCO_* env vars — the entrypoint wrapper
  # does not accept --modern-bpf as a CLI flag.
  falco:
    image: falcosecurity/falco:0.39.2
    container_name: falco
    privileged: true
    pid: host
    environment:
      - FALCO_DRIVER_CHOICE=modern_ebpf
      - FALCO_JSON_OUTPUT=true
      - FALCO_FILE_OUTPUT_ENABLED=true
      - FALCO_FILE_OUTPUT_FILENAME=/var/log/falco/events.json
      - FALCO_FILE_OUTPUT_KEEP_ALIVE=true
      - FALCO_JSON_INCLUDE_OUTPUT_PROPERTY=true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /dev:/host/dev:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux:ro
      - falco_logs:/var/log/falco
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.45

networks:
  compute-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.1.0/24
  storage-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.2.0/24
  mgmt-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.3.0/24
  # Non-internal bridge used exclusively to publish the dashboard port to the host.
  # No other services join this network, so it doesn't widen the attack surface.
  host-access:
    driver: bridge

volumes:
  shared_data:
  # ── REC-08: Persistent integrity audit records ──────────────────────────
  # Stores JSON audit records from every pre-flight check run.
  # Mount this volume or copy files out to retain evidence across rebuilds.
  integrity_audits:
  # ── REC-09: Pre-quarantine forensic artifacts ────────────────────────────
  # Each quarantine event writes a JSON file here: {node}_{trigger}_{ts}.json
  # Evidence persists even after the quarantined container is removed.
  forensics:
