services:
  controller:
    build: ./controller
    container_name: controller
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
    volumes:
      - shared_data:/data
      - ./risk_engine/config:/opt/security/config:ro
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.10

  risk-engine:
    build: ./risk_engine
    container_name: risk-engine
    environment:
      - ALLOWLIST_PATH=/opt/security/config/allowlist.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shared_data:/data
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.11

  dashboard:
    build: ./dashboard
    container_name: dashboard
    volumes:
      - shared_data:/data
    depends_on:
      - risk-engine
    network_mode: host

  node1:
    build: ./node_agent
    container_name: node1
    environment:
      - NODE_NAME=node1
      - HMAC_SECRET=${HMAC_SECRET}
      - NODE_PEER_IPS=172.20.0.1,172.20.0.2,172.20.0.3,172.20.0.4
      - NETWORK_CLUSTER_CIDR=172.20.0.0/16
      - NETWORK_ALLOWED_PORTS=22,514,5555,5556
      - NETWORK_ALLOWED_LISTEN_PORTS=5556
      - NETWORK_MAX_REMOTE_TARGETS=8
      - PROCESS_POLICY_PATH=/opt/security/config/process_policy.yaml
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.21
      mgmt-net:
        ipv4_address: 10.10.3.21

  node2:
    build: ./node_agent
    container_name: node2
    environment:
      - NODE_NAME=node2
      - HMAC_SECRET=${HMAC_SECRET}
      - NODE_PEER_IPS=172.20.0.1,172.20.0.2,172.20.0.3,172.20.0.4
      - NETWORK_CLUSTER_CIDR=172.20.0.0/16
      - NETWORK_ALLOWED_PORTS=22,514,5555,5556
      - NETWORK_ALLOWED_LISTEN_PORTS=5556
      - NETWORK_MAX_REMOTE_TARGETS=8
      - PROCESS_POLICY_PATH=/opt/security/config/process_policy.yaml
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.22
      mgmt-net:
        ipv4_address: 10.10.3.22

  node3:
    build: ./node_agent
    container_name: node3
    environment:
      - NODE_NAME=node3
      - HMAC_SECRET=${HMAC_SECRET}
      - NODE_PEER_IPS=172.20.0.1,172.20.0.2,172.20.0.3,172.20.0.4
      - NETWORK_CLUSTER_CIDR=172.20.0.0/16
      - NETWORK_ALLOWED_PORTS=22,514,5555,5556
      - NETWORK_ALLOWED_LISTEN_PORTS=5556
      - NETWORK_MAX_REMOTE_TARGETS=8
      - PROCESS_POLICY_PATH=/opt/security/config/process_policy.yaml
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
    networks:
      compute-net:
        ipv4_address: 10.10.1.23
      mgmt-net:
        ipv4_address: 10.10.3.23

  node4:
    build: ./node_agent
    container_name: node4
    environment:
      - NODE_NAME=node4
      - HMAC_SECRET=${HMAC_SECRET}
      - NODE_PEER_IPS=172.20.0.1,172.20.0.2,172.20.0.3,172.20.0.4
      - NETWORK_CLUSTER_CIDR=172.20.0.0/16
      - NETWORK_ALLOWED_PORTS=22,514,5555,5556
      - NETWORK_ALLOWED_LISTEN_PORTS=5556
      - NETWORK_MAX_REMOTE_TARGETS=8
      - PROCESS_POLICY_PATH=/opt/security/config/process_policy.yaml
      - CONFIG_HASHES_PATH=/opt/security/config/config_hashes.yaml
    volumes:
      - ./risk_engine/config:/opt/security/config:ro
    depends_on:
      - controller
    networks:
      storage-net:
        ipv4_address: 10.10.2.31
      mgmt-net:
        ipv4_address: 10.10.3.31

  wazuh:
    build: ./wazuh
    container_name: wazuh
    volumes:
      - shared_data:/data
    networks:
      mgmt-net:
        ipv4_address: 10.10.3.40

  security-monitor:
    build: ./security_monitor
    container_name: security-monitor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    depends_on:
      - wazuh
    volumes:
      - shared_data:/var/log/shared
    environment:
      - SURICATA_INTERFACE=eth0
      - ZEEK_INTERFACE=eth0
      - ZEEK_SCRIPT=/opt/security-monitor/zeek/hpc_monitor.zeek
    networks:
      compute-net:
        ipv4_address: 10.10.1.250
      storage-net:
        ipv4_address: 10.10.2.250
      mgmt-net:
        ipv4_address: 10.10.3.250

networks:
  compute-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.1.0/24
  storage-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.2.0/24
  mgmt-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.3.0/24

volumes:
  shared_data:
